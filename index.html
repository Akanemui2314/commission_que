<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commission Queue - 2026</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #ffe0e0 0%, #ffc9b1 100%);
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.6);
            --primary-orange: #ff9b83;
            --soft-green: #c4e17f;
            --status-grey: #b0b0b0;
            --status-yellow: #fdd835;
            --status-green: #81c784;
            --status-red: #ff8a80;
            --text-main: #5a4a42;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            color: var(--text-main);
            display: flex;
            justify-content: center;
        }

        /* Liquid Hearts Animation */
        #hearts-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
        .heart { position: absolute; width: 20px; height: 20px; background: white; opacity: 0.4; clip-path: path('M12,21.35L10.55,20.03C5.4,15.36 2,12.27 2,8.5C2,5.41 4.41,3 7.5,3C9.24,3 10.91,3.81 12,5.08C13.09,3.81 14.76,3 16.5,3C19.59,3 22,5.41 22,8.5C22,12.27 18.6,15.36 13.45,20.03L12,21.35Z'); animation: floatHearts linear infinite; filter: blur(1px); }
        @keyframes floatHearts { 0% { transform: translateY(110vh) rotate(0deg); opacity: 0; } 50% { opacity: 0.6; } 100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; } }

        /* Liquid Glass Container */
        .glass-card {
            width: 100%;
            max-width: 1100px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(255, 138, 128, 0.2);
        }

        .header-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr auto;
            gap: 20px;
            align-items: start;
            margin-bottom: 35px;
        }

        .info-panel {
            background: rgba(255, 255, 255, 0.5);
            padding: 20px;
            border-radius: 20px;
            border-left: 5px solid var(--primary-orange);
        }

        .join-btn {
            background: var(--soft-green);
            color: white;
            padding: 18px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 4px 15px rgba(196, 225, 127, 0.4);
            transition: 0.3s;
            border: 2px solid white;
        }

        .join-btn:hover { transform: scale(1.05); filter: brightness(1.05); }

        .shop-controls { text-align: center; }

        .status-badge {
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            color: white;
            display: inline-block;
            margin-bottom: 10px;
            border: 2px solid rgba(255,255,255,0.5);
        }
        .status-badge.on { background: #81c784; box-shadow: 0 0 15px rgba(129, 199, 132, 0.5); }
        .status-badge.off { background: #ff8a80; }

        /* Table Design */
        .table-wrapper {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 10px;
            overflow-x: auto;
        }

        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { padding: 15px; color: #8d6e63; font-weight: 600; text-align: left; border-bottom: 2px solid rgba(255,255,255,0.4); }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.2); }

        /* Status & Payment Bubbles */
        .bubble {
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
            color: white;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .bg-pending { background: var(--status-grey); }
        .bg-doing { background: var(--status-yellow); color: #5a4a42; }
        .bg-done { background: var(--status-green); }

        /* Input Controls */
        .input-glass {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 8px;
            width: 100%;
            color: var(--text-main);
        }

        .btn-add {
            background: var(--primary-orange);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            float: right;
        }

        .btn-delete {
            background: none;
            border: 1px solid #ff8a80;
            color: #ff8a80;
            padding: 5px 10px;
            border-radius: 8px;
            cursor: pointer;
        }

        #admin-ui { display: none; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="hearts-container"></div>

    <div class="glass-card">
        <div class="header-grid">
            <div class="info-panel">
                <h1 style="margin:0; color: var(--primary-orange);">Commission Queue</h1>
                <p style="margin:5px 0 0;">นุเนะ แมวเม่น • 2026</p>
            </div>
            <div style="font-size: 13px; opacity: 0.8;">
                <b>Contact:</b><br>สนใจจ้างงานติดต่อได้ที่<br>Facebook: นุเนะ แมวเม่น
            </div>
            <a href="https://www.facebook.com/akanemui2314" target="_blank" class="join-btn">Join Wait-list</a>
            <div class="shop-controls">
                <div id="shop-status" class="status-badge on" onclick="toggleShop()">STATUS: ON</div>
                <div id="count-display" style="font-weight:bold; font-size:14px;">Active: 0 orders</div>
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th width="100">Date</th>
                        <th width="130">Status</th>
                        <th>Contact</th>
                        <th width="100">Deadline</th>
                        <th width="130">Payment</th>
                        <th>Type</th>
                        <th>Note</th>
                        <th id="th-admin" style="display:none">Action</th>
                    </tr>
                </thead>
                <tbody id="queue-body"></tbody>
            </table>
        </div>

        <div id="admin-ui">
            <button class="btn-add" onclick="addRow()">+ เพิ่มลูกค้าใหม่</button>
            <p style="color:var(--primary-orange); font-size:12px;">*แก้ไขเสร็จแล้วอย่าลืม Copy ข้อมูลไป Save ใน GitHub นะครับ</p>
        </div>
    </div>

    <script>
        const PASSWORD = "1234"; // *** เปลี่ยนรหัสผ่านตรงนี้ ***
        let isAdmin = false;
        let data = { shopOn: true, list: [] };

        // โหมดแอดมิน: ต้องพิมพ์ ?admin=true ต่อท้าย URL
        const params = new URLSearchParams(window.location.search);
        if (params.get('admin') === 'true') {
            if (prompt("กรุณาใส่รหัสผ่าน:") === PASSWORD) {
                isAdmin = true;
                document.getElementById('admin-ui').style.display = 'block';
                document.getElementById('th-admin').style.display = 'table-cell';
            } else { window.location.href = window.location.pathname; }
        }

        function render() {
            const body = document.getElementById('queue-body');
            body.innerHTML = '';
            
            const badge = document.getElementById('shop-status');
            badge.className = `status-badge ${data.shopOn ? 'on' : 'off'}`;
            badge.innerText = `STATUS: ${data.shopOn ? 'ON' : 'OFF'}`;

            data.list.forEach((item, idx) => {
                const tr = document.createElement('tr');
                if (isAdmin) {
                    tr.innerHTML = `
                        <td><input type="date" class="input-glass" value="${item.date}" onchange="edit(${idx},'date',this.value)"></td>
                        <td><select class="input-glass" onchange="edit(${idx},'status',this.value);render()">
                            <option value="bg-pending" ${item.status==='bg-pending'?'selected':''}>ยังไม่เริ่ม</option>
                            <option value="bg-doing" ${item.status==='bg-doing'?'selected':''}>กำลังทำ</option>
                            <option value="bg-done" ${item.status==='bg-done'?'selected':''}>สำเร็จแล้ว</option>
                        </select></td>
                        <td><input type="text" class="input-glass" value="${item.contact}" onchange="edit(${idx},'contact',this.value)"></td>
                        <td><input type="date" class="input-glass" value="${item.deadline}" onchange="edit(${idx},'deadline',this.value)"></td>
                        <td><select class="input-glass" onchange="edit(${idx},'pay',this.value);render()">
                            <option value="bg-pending" ${item.pay==='bg-pending'?'selected':''}>ยังไม่ชำระ</option>
                            <option value="bg-doing" ${item.pay==='bg-doing'?'selected':''}>มัดจำแล้ว</option>
                            <option value="bg-done" ${item.pay==='bg-done'?'selected':''}>ชำระเต็ม</option>
                        </select></td>
                        <td><input type="text" class="input-glass" value="${item.type}" onchange="edit(${idx},'type',this.value)"></td>
                        <td><input type="text" class="input-glass" value="${item.note}" onchange="edit(${idx},'note',this.value)"></td>
                        <td><button class="btn-delete" onclick="remove(${idx})">ลบ</button></td>
                    `;
                } else {
                    tr.innerHTML = `
                        <td>${item.date || '-'}</td>
                        <td><div class="bubble ${item.status}">${getText(item.status)}</div></td>
                        <td>${item.contact.includes('http') ? `<a href="${item.contact}" target="_blank" style="color:var(--primary-orange)">Link</a>` : item.contact}</td>
                        <td>${item.deadline || '-'}</td>
                        <td><div class="bubble ${item.pay}">${getPayText(item.pay)}</div></td>
                        <td>${item.type}</td>
                        <td>${item.note}</td>
                    `;
                }
                body.appendChild(tr);
            });
            document.getElementById('count-display').innerText = `Active: ${data.list.filter(i=>i.status!=='bg-done').length} orders`;
        }

        function edit(idx, key, val) { data.list[idx][key] = val; }
        function addRow() { data.list.push({date:'', status:'bg-pending', contact:'', deadline:'', pay:'bg-pending', type:'', note:''}); render(); }
        function remove(idx) { if(confirm('ลบคิวนี้?')) { data.list.splice(idx, 1); render(); } }
        function toggleShop() { if(isAdmin) { data.shopOn = !data.shopOn; render(); } }
        function getText(s) { return s==='bg-pending'?'ยังไม่เริ่ม':s==='bg-doing'?'กำลังทำ':'สำเร็จแล้ว'; }
        function getPayText(s) { return s==='bg-pending'?'ยังไม่ชำระ':s==='bg-doing'?'มัดจำแล้ว':'ชำระเต็ม'; }

        // Hearts Setup
        for(let i=0; i<20; i++){
            const h = document.createElement('div');
            h.className = 'heart';
            h.style.left = Math.random()*100+'vw';
            h.style.animationDelay = Math.random()*8+'s';
            h.style.animationDuration = 5+Math.random()*5+'s';
            document.getElementById('hearts-container').appendChild(h);
        }
        render();
    </script>
</body>
</html>
