<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commission Queue - Sakura Edition</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #fff0f5 0%, #ffdbdb 100%);
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.6);
            --primary-pink: #ffb7c5;
            --accent-pink: #ff91a4;
            --soft-green: #c4e17f;
            --text-main: #5a4a42;
            
            --status-pending-bg: #f0f0f0; --status-pending-text: #757575;
            --status-doing-bg: #fff9c4; --status-doing-text: #827717;
            --status-done-bg: #c8e6c9; --status-done-text: #1b5e20;
            --status-off: #ff8a80;
        }

        body {
            margin: 0; padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient); min-height: 100vh; color: var(--text-main);
            display: flex; justify-content: center; align-items: flex-start;
            position: relative; overflow-x: hidden;
        }

        /* Fixed Sakura Animation */
        #sakura-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .petal {
            position: absolute; 
            top: -50px; /* เริ่มต้นนอกจอ */
            background-color: #ffb7c5; 
            border-radius: 150% 0 150% 0;
            opacity: 0; 
            transform-origin: center; 
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.7; } /* ค่อยๆ ปรากฏ */
            90% { opacity: 0.7; }
            100% { transform: translateY(110vh) translateX(120px) rotate(360deg); opacity: 0; }
        }

        .glass-card {
            width: 100%; max-width: 1100px; background: var(--glass-bg);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 40px; padding: 40px;
            box-shadow: 0 15px 35px rgba(255, 183, 197, 0.3); margin-top: 20px;
            position: relative; z-index: 2;
        }

        .admin-shortcut {
            position: absolute; top: 20px; right: 20px; width: 35px; height: 35px;
            background: rgba(255,255,255,0.5); border-radius: 50%; border: 1px solid white;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            font-size: 18px; transition: 0.3s;
        }
        .admin-shortcut:hover { transform: rotate(90deg); background: white; }

        .header-section { display: grid; grid-template-columns: 1.2fr 1fr 0.8fr 0.6fr; gap: 20px; align-items: center; margin-bottom: 40px; }
        .title-box { background: rgba(255, 255, 255, 0.7); padding: 20px; border-radius: 25px; border: 1px solid white; }
        
        .contact-bubble {
            background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(10px);
            border: 2px solid white; padding: 15px 20px; border-radius: 30px;
            font-size: 13px; line-height: 1.6; box-shadow: 0 8px 32px rgba(255, 255, 255, 0.2);
        }

        .join-btn { background: var(--soft-green); color: white; padding: 15px; border-radius: 50px; text-decoration: none; font-weight: bold; text-align: center; border: 2px solid white; box-shadow: 0 8px 20px rgba(196, 225, 127, 0.3); }

        .status-badge { padding: 8px 20px; border-radius: 50px; font-weight: bold; color: white; border: 2px solid white; text-align: center; font-size: 14px; cursor: pointer; transition: 0.3s; }
        .status-badge.on { background: #81c784; box-shadow: 0 4px 15px rgba(129, 199, 132, 0.3); }
        .status-badge.off { background: var(--status-off); box-shadow: 0 4px 15px rgba(255, 138, 128, 0.3); }

        .active-label { font-weight: bold; font-size: 14px; background: white; padding: 5px 15px; border-radius: 50px; margin-top: 10px; text-align: center; }
        .update-time { font-size: 10px; opacity: 0.5; margin-top: 5px; font-weight: normal; text-align: center; }

        .table-container { background: rgba(255, 255, 255, 0.25); border-radius: 35px; padding: 15px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 850px; }
        th { padding: 18px; color: #8d6e63; font-weight: bold; border-bottom: 2px solid rgba(255,255,255,0.4); }
        td { padding: 18px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.2); font-size: 14px; }

        .bubble { padding: 6px 15px; border-radius: 50px; font-size: 12px; font-weight: bold; display: inline-block; min-width: 100px; border: 1px solid rgba(255,255,255,0.5); }
        .bg-pending { background: var(--status-pending-bg); color: var(--status-pending-text); }
        .bg-doing { background: var(--status-doing-bg); color: var(--status-doing-text); }
        .bg-done { background: var(--status-done-bg); color: var(--status-done-text); }
    </style>
</head>
<body>

    <div id="sakura-container"></div>

    <div class="glass-card">
        <div class="admin-shortcut" onclick="goToSheet()" title="เข้าจัดการข้อมูล">⚙️</div>

        <div class="header-section">
            <div class="title-box">
                <h1 style="margin:0; color: var(--accent-pink); font-size: 26px;">Commission Queue</h1>
                <p style="margin:5px 0 0; opacity: 0.8;">นุเนะ แมวเม่น • 2026</p>
            </div>
            
            <div class="contact-bubble">
                <b>Contact:</b><br>
                สนใจจ้างงานหรือสอบถามรายละเอียดเพิ่มเติม ติดต่อ<br>
                Facebook: นุเนะ แมวเม่น
            </div>

            <a href="https://www.facebook.com/akanemui2314" target="_blank" class="join-btn">Join Wait-list</a>
            
            <div style="display:flex; flex-direction:column; align-items: center;">
                <div id="shop-status" class="status-badge on" onclick="toggleStatus()">STATUS: ON</div>
                <div id="active-count" class="active-label">Active: 0 orders</div>
                <div id="last-updated" class="update-time">อัปเดตล่าสุด: -</div>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Status</th>
                        <th>Contact</th>
                        <th>Deadline</th>
                        <th>Payment</th>
                        <th>Note</th>
                    </tr>
                </thead>
                <tbody id="queue-table"></tbody>
            </table>
        </div>
    </div>

    <script>
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTWq26jrX4nDcIGzIaO-XQW0saxFlwZO2H7SVakkr45n3Bx5SfmsNxVpQhhBSlf2bOt73DIY2pvkgtB/pub?output=csv';
        const SHEET_EDIT_URL = 'https://docs.google.com/spreadsheets/d/1QyTn6jTpV_yHvf4MVBkwGdqJdjRd5B0Dm1YnWw0qJ0I/edit?gid=0#gid=0';
        const ADMIN_PW = '2314';

        async function loadData() {
            try {
                const res = await fetch(SHEET_CSV_URL + '&cb=' + Date.now());
                const csv = await res.text();
                const rows = csv.split('\n').slice(1);
                const table = document.getElementById('queue-table');
                table.innerHTML = '';
                let count = 0;

                rows.forEach(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
                    if (cols.length < 5 || !cols[0]) return;

                    const statusVal = cols[1] || '';
                    if (!statusVal.includes('สำเร็จ') && !statusVal.includes('Done')) count++;

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${cols[0] || '-'}</td>
                        <td><div class="bubble ${getColorClass(cols[1])}">${cols[1] || '-'}</div></td>
                        <td>${cols[2] && cols[2].includes('http') ? `<a href="${cols[2]}" target="_blank" style="color:var(--accent-pink); font-weight:bold;">Link</a>` : (cols[2] || '-')}</td>
                        <td>${cols[3] || '-'}</td>
                        <td><div class="bubble ${getColorClass(cols[4])}">${cols[4] || '-'}</div></td>
                        <td>${cols[6] || '-'}</td>
                    `;
                    table.appendChild(tr);
                });
                document.getElementById('active-count').innerText = `Active: ${count} orders`;
                
                // แสดงเวลาที่อัปเดตล่าสุด
                const now = new Date();
                const timeStr = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                const dateStr = now.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
                document.getElementById('last-updated').innerText = `อัปเดตล่าสุด: ${dateStr} ${timeStr}`;

            } catch (e) { console.error(e); }
        }

        function getColorClass(t) {
            if (!t) return 'bg-pending';
            if (t.includes('ทำ') || t.includes('มัดจำ') || t.includes('Progress')) return 'bg-doing';
            if (t.includes('สำเร็จ') || t.includes('เต็ม') || t.includes('Done')) return 'bg-done';
            return 'bg-pending';
        }

        function toggleStatus() {
            if (prompt('กรุณาใส่รหัสผ่านเพื่อเปลี่ยนสถานะร้าน:') === ADMIN_PW) {
                const btn = document.getElementById('shop-status');
                if (btn.classList.contains('on')) {
                    btn.classList.replace('on', 'off');
                    btn.innerText = 'STATUS: OFF';
                } else {
                    btn.classList.replace('off', 'on');
                    btn.innerText = 'STATUS: ON';
                }
            } else {
                alert('รหัสผ่านไม่ถูกต้อง!');
            }
        }

        function goToSheet() {
            if (prompt('กรุณาใส่รหัสผ่านเพื่อเข้าหน้าจัดการข้อมูล (Sheet):') === ADMIN_PW) {
                window.open(SHEET_EDIT_URL, '_blank');
            } else {
                alert('รหัสผ่านไม่ถูกต้อง!');
            }
        }

        // Improved Sakura Petals Setup
        const sakuraContainer = document.getElementById('sakura-container');
        for(let i=0; i<20; i++){
            const petal = document.createElement('div');
            petal.className = 'petal';
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.width = Math.random() * 10 + 10 + 'px';
            petal.style.height = Math.random() * 10 + 5 + 'px';
            petal.style.animationDelay = Math.random() * 12 + 's'; // สุ่มเวลาเริ่มให้ต่างกันมากขึ้น
            petal.style.animationDuration = Math.random() * 6 + 6 + 's';
            sakuraContainer.appendChild(petal);
        }

        loadData();
        setInterval(loadData, 10000); // ซิงค์ข้อมูลทุก 10 วินาที
    </script>
</body>
</html>
